name: Build APK directly from uploaded zip

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find uploaded project zip
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Repository files:"
          find . -maxdepth 4 -type f ! -path './.git/*' -printf '%p (%s bytes)\n' | sort | head -n 200

          mapfile -t ZIP_FILES < <(
            find . -type f -iname '*.zip' \
              ! -path './.git/*' \
              ! -path './_project/*' \
              -printf '%s %p\n' | sort -nr | sed 's/^[0-9]* //'
          )

          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "ERROR: No zip file found. Upload the Android project zip to repository root, then run again."
            exit 1
          fi

          ZIP_FILE="${ZIP_FILES[0]}"
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using zip: $ZIP_FILE"

      - name: Unzip project in runner only
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf _project
          mkdir _project

          echo "Testing zip..."
          unzip -t "$ZIP_FILE"

          echo "Extracting zip..."
          unzip -q "$ZIP_FILE" -d _project

          PROJECT_DIR="$(
            find _project -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -printf '%h\n' | head -n 1 || true
          )"

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Could not find settings.gradle or settings.gradle.kts inside zip."
            echo "Extracted files:"
            find _project -maxdepth 6 -type f | sort | head -n 300
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory: $PROJECT_DIR"

          if [ ! -d "$PROJECT_DIR/app" ]; then
            echo "ERROR: app directory not found inside project."
            find "$PROJECT_DIR" -maxdepth 3 -type f | sort | head -n 200
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Android local.properties
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"

          if [ -n "${ANDROID_HOME:-}" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          else
            echo "WARNING: ANDROID_HOME not found. Gradle may still detect SDK from runner."
          fi

          echo "Project root:"
          pwd
          echo "Top-level files:"
          find . -maxdepth 2 -type f | sort

      - name: Build debug APK
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug --stacktrace --warning-mode all
          else
            gradle :app:assembleDebug --stacktrace --warning-mode all
          fi

      - name: Collect APK
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf _apk_output
          mkdir _apk_output

          find "$PROJECT_DIR/app/build/outputs/apk" -type f -name "*.apk" -print -exec cp {} _apk_output/ \;

          APK_COUNT="$(find _apk_output -type f -name '*.apk' | wc -l)"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: Build finished but no APK was found."
            find "$PROJECT_DIR/app/build" -maxdepth 6 -type f | sort | head -n 300
            exit 1
          fi

          echo "APK files:"
          find _apk_output -type f -name '*.apk' -printf '%p (%s bytes)\n'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PharmaCoachAI-debug-apk
          path: _apk_output/*.apk
          if-no-files-found: error

      - name: Collect build logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p _build_debug_logs

          if [ -n "${PROJECT_DIR:-}" ] && [ -d "$PROJECT_DIR" ]; then
            find "$PROJECT_DIR" -type f \( \
              -name "*.log" -o \
              -name "manifest-merger-*.txt" -o \
              -name "report.txt" -o \
              -name "problems-report.html" \
            \) -exec cp --parents {} _build_debug_logs/ \; || true

            find "$PROJECT_DIR" -maxdepth 6 -type f | sort > _build_debug_logs/project-file-list.txt || true
          fi

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PharmaCoachAI-build-failure-logs
          path: _build_debug_logs
          if-no-files-found: ignore
