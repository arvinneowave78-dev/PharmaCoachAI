name: Unzip project into repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project zip
        run: |
          set -e

          ZIP_FILE="$(find . -maxdepth 1 -type f -name '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in repository root."
            exit 1
          fi

          echo "Found zip: $ZIP_FILE"

          rm -rf _unzipped_project
          mkdir _unzipped_project

          unzip -q "$ZIP_FILE" -d _unzipped_project

          PROJECT_DIR="$(find _unzipped_project -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -printf '%h\n' | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not find settings.gradle or settings.gradle.kts inside the zip."
            echo "Showing extracted files:"
            find _unzipped_project -maxdepth 4 -type f | head -n 80
            exit 1
          fi

          echo "Project directory is: $PROJECT_DIR"

          shopt -s dotglob
          cp -R "$PROJECT_DIR"/* ./

          rm -rf _unzipped_project
          rm -f "$ZIP_FILE"

      - name: Commit unzipped project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Unzip Android project"
            git push
          fi
